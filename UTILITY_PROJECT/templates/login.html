<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartBill-X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #1e3c72; border: none; padding: 12px; }
        .brand-logo { color: #1e3c72; font-weight: bold; text-decoration: none; font-size: 1.5rem; display: block; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="/" class="brand-logo">⚡ SmartBill-X</a>
        <h3 class="text-center mb-4">User Login</h3>

        <!-- Flash messages for errors (like wrong password) -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger p-2 text-center" style="font-size: 0.9rem;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
        </form>

        <div class="text-center">
            <p class="mb-1" style="font-size: 0.9rem;">New here? <a href="/register">Create an account</a></p>
            <hr>
            <small class="text-muted">Master Admin: <b>admin</b> | <b>admin123</b></small>
        </div>
    </div>

</body>
</html>
