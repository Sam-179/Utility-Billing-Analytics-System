<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SmartBill-X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .register-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-success { background-color: #28a745; border: none; padding: 12px; font-weight: bold; }
        .brand-logo { color: #1e3c72; font-weight: bold; text-decoration: none; font-size: 1.5rem; display: block; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="register-card">
        <a href="/" class="brand-logo">⚡ SmartBill-X</a>
        <h3 class="text-center mb-4">Create Account</h3>

        <!-- Flash messages for registration errors (e.g., username taken) -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-warning p-2 text-center" style="font-size: 0.9rem;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <div class="mb-3">
                <label class="form-label">Full Name / Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                <small class="text-muted">Passwords are securely hashed in our database.</small>
            </div>
            <button type="submit" class="btn btn-success w-100 mb-3">Register Now</button>
        </form>

        <div class="text-center">
            <p class="mb-0" style="font-size: 0.9rem;">Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>

</body>
</html>
