<!DOCTYPE html>
<html>
<head>
    <title>Bill Summary</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .result-card { 
            background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center;
        }
        /* Static styles stay here */
        .warning-box {
            font-weight: bold; background: #f8f9fa; 
            padding: 12px; border-radius: 8px;
            margin-bottom: 20px; font-size: 0.9rem;
        }
        h1 { color: #764ba2; font-size: 2.5rem; margin: 10px 0; }
        p { color: #555; }
        a { text-decoration: none; color: #764ba2; font-weight: bold; }
    </style>
</head>
<body>
    <div class="result-card">
        <h2>{{ service }} Bill</h2>
        
        <!-- We moved the dynamic CSS variables directly into the HTML tag here -->
        <div class="warning-box" style="color: {{ warning_color }}; border-left: 5px solid {{ warning_color }};">
            {{ warning }}
        </div>

        <p>Units: <strong>{{ units }}</strong> | Status: <strong>{{ status }}</strong></p>
        <h1>{{ symbol }}{{ total }}</h1>
        
        <br>
        <a href="/">← NEW CALCULATION</a>
    </div>
</body>
</html>
